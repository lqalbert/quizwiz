<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>题目反馈</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 24px; color: #222; }
      h1 { margin: 0 0 16px; }
      .toolbar { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      select, button, textarea { padding: 8px; font-size: 14px; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      th, td { border: 1px solid #ddd; padding: 8px; font-size: 13px; vertical-align: top; }
      th { background: #f8f8f8; text-align: left; }
      .stem { max-width: 280px; white-space: pre-wrap; word-break: break-word; }
      .muted { color: #666; font-size: 12px; }
      .err { color: #b42318; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h1 style="margin:0">学生题目反馈</h1>
      <div>
        <a href="/admin-ui/index.html">导入任务</a>
        <span style="margin:0 8px">|</span>
        <a href="/admin-ui/users.html">用户管理</a>
        <button type="button" id="logoutBtn" style="margin-left:12px;padding:8px 14px">退出</button>
      </div>
    </div>
    <div class="toolbar">
      <label>状态 <select id="statusFilter">
        <option value="">全部</option>
        <option value="open" selected>待处理</option>
        <option value="reviewing">处理中</option>
        <option value="closed">已关闭</option>
      </select></label>
      <label>视图 <select id="viewMode">
        <option value="detail">反馈明细</option>
        <option value="question">按题聚合</option>
      </select></label>
      <label>排序 <select id="sortMode">
        <option value="latestReportedAt:desc">最近反馈(新到旧)</option>
        <option value="latestReportedAt:asc">最近反馈(旧到新)</option>
        <option value="reportCount:desc">反馈次数(高到低)</option>
        <option value="reportCount:asc">反馈次数(低到高)</option>
      </select></label>
      <button type="button" id="loadBtn">刷新</button>
    </div>
    <div id="err" class="err"></div>
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
    <p class="muted" id="summary"></p>

    <script src="/admin-ui/auth.js"></script>
    <script>
      (function () {
        if (!QuizWizAuth.requireLogin()) return;

        var REASON_LABEL = {
          answer_wrong: '答案可能有误',
          stem_error: '题干/表述有问题',
          option_error: '选项有问题',
          typo: '错别字/格式',
          other: '其他',
        };

        function el(id) { return document.getElementById(id); }

        el('logoutBtn').onclick = function () { QuizWizAuth.logout(); };

        function authFetch(url, opts) {
          opts = opts || {};
          opts.headers = Object.assign({}, opts.headers || {}, QuizWizAuth.getAuthHeaders());
          if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
            opts.headers['Content-Type'] = 'application/json';
            opts.body = JSON.stringify(opts.body);
          }
          return fetch(url, opts).then(function (res) {
            QuizWizAuth.handleResponse(res);
            return res;
          });
        }

        var isAdmin = false;

        function render(rows, viewMode) {
          var tb = el('tbody');
          var th = el('thead');
          tb.innerHTML = '';
          if (viewMode === 'question') {
            th.innerHTML = '<tr><th>题目ID</th><th>最近反馈时间</th><th>反馈总数</th><th>状态分布</th><th>题干摘要</th><th>操作</th></tr>';
          } else {
            th.innerHTML = '<tr><th>ID</th><th>时间</th><th>学生ID</th><th>题目ID</th><th>题干摘要</th><th>类型</th><th>说明</th><th>状态</th><th>操作</th></tr>';
          }
          if (!rows.length) {
            tb.innerHTML = '<tr><td colspan="' + (viewMode === 'question' ? 6 : 9) + '">暂无记录</td></tr>';
            return;
          }
          if (viewMode === 'question') {
            rows.forEach(function (r) {
              var tr = document.createElement('tr');
              var stem = (r.stem || '').slice(0, 120) + ((r.stem || '').length > 120 ? '…' : '');
              var statusDist = 'open:' + (r.openCount || 0) + ' / reviewing:' + (r.reviewingCount || 0) + ' / closed:' + (r.closedCount || 0);
              tr.innerHTML =
                '<td>' + r.questionId + '</td>' +
                '<td>' + (r.latestReportedAt || '') + '</td>' +
                '<td>' + (r.reportCount || 0) + '</td>' +
                '<td>' + statusDist + '</td>' +
                '<td class="stem">' + stem.replace(/</g, '&lt;') + '</td>' +
                '<td></td>';
              var op = tr.querySelector('td:last-child');
              var activeReportId = Number(r.latestActiveReportId || 0);
              if (isAdmin && activeReportId > 0 && !r.questionDeleted) {
                var bDelAgg = document.createElement('button');
                bDelAgg.textContent = '确认有误并删除题目';
                bDelAgg.style.color = '#b42318';
                bDelAgg.onclick = function () {
                  getQuestionImpact(r.questionId)
                    .then(function (impactResp) {
                      var msg = impactText(impactResp) + '\n将把该题从题库下架（软删除），并关闭一条活跃反馈单。此操作不可撤销，确定吗？';
                      if (!window.confirm(msg)) return;
                      var note = window.prompt('备注（可选，留空则使用系统默认说明）', '');
                      if (note === null) return;
                      confirmDeleteQuestion(activeReportId, note);
                    })
                    .catch(function (e) { el('err').textContent = e.message || String(e); });
                };
                op.appendChild(bDelAgg);
              } else {
                op.textContent = '-';
              }
              tb.appendChild(tr);
            });
            return;
          }
          rows.forEach(function (r) {
            var tr = document.createElement('tr');
            var stem = (r.stem || '').slice(0, 120) + ((r.stem || '').length > 120 ? '…' : '');
            tr.innerHTML =
              '<td>' + r.id + '</td>' +
              '<td>' + (r.createdAt || '') + '</td>' +
              '<td>' + r.studentId + '</td>' +
              '<td>' + r.questionId + '</td>' +
              '<td class="stem">' + stem.replace(/</g, '&lt;') + '</td>' +
              '<td>' + (REASON_LABEL[r.reasonType] || r.reasonType) + '</td>' +
              '<td>' + String(r.detail || '').replace(/</g, '&lt;') + '</td>' +
              '<td>' + r.status + '</td>' +
              '<td data-id="' + r.id + '"></td>';
            var op = tr.querySelector('td:last-child');
            if (r.status === 'open') {
              var b1 = document.createElement('button');
              b1.textContent = '处理中';
              b1.onclick = function () { patchStatus(r.id, 'reviewing'); };
              op.appendChild(b1);
            }
            if (isAdmin && r.status !== 'closed' && !r.questionDeleted) {
              var bDel = document.createElement('button');
              bDel.textContent = '确认有误并删除题目';
              bDel.style.marginLeft = '4px';
              bDel.style.color = '#b42318';
              bDel.onclick = function () {
                getQuestionImpact(r.questionId)
                  .then(function (impactResp) {
                    var msg = impactText(impactResp) + '\n将把该题从题库下架（软删除），并关闭本条反馈。此操作不可撤销，确定吗？';
                    if (!window.confirm(msg)) return;
                    var note = window.prompt('备注（可选，留空则使用系统默认说明）', '');
                    if (note === null) return;
                    confirmDeleteQuestion(r.id, note);
                  })
                  .catch(function (e) { el('err').textContent = e.message || String(e); });
              };
              op.appendChild(bDel);
            }
            if (r.status !== 'closed') {
              var b2 = document.createElement('button');
              b2.textContent = '关闭';
              b2.style.marginLeft = '4px';
              b2.onclick = function () {
                var note = window.prompt('备注（可选）', '');
                if (note === null) return;
                patchStatus(r.id, 'closed', note);
              };
              op.appendChild(b2);
            }
            tb.appendChild(tr);
          });
        }

        function confirmDeleteQuestion(id, note) {
          var body = {};
          if (note && String(note).trim()) body.adminNote = String(note).trim();
          authFetch('/admin/question-reports/' + id + '/confirm-delete-question', { method: 'POST', body: body })
            .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
            .then(function (x) {
              if (!x.res.ok) throw new Error(x.j.message || '操作失败');
              load();
            })
            .catch(function (e) { el('err').textContent = e.message || String(e); });
        }

        function getQuestionImpact(questionId) {
          return authFetch('/admin/question-reports/question-impact/' + questionId)
            .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
            .then(function (x) {
              if (!x.res.ok) throw new Error(x.j.message || '加载题目影响面失败');
              return x.j;
            });
        }

        function impactText(impactResp) {
          var impact = impactResp && impactResp.impact ? impactResp.impact : {};
          var reportCount = impact.reportCount == null ? 'N/A' : String(impact.reportCount);
          var practiceCount = impact.practiceAnswerCount == null ? 'N/A' : String(impact.practiceAnswerCount);
          var favoriteCount = impact.favoriteCount == null ? 'N/A' : String(impact.favoriteCount);
          var wrongCount = impact.wrongQuestionCount == null ? 'N/A' : String(impact.wrongQuestionCount);
          var text = '影响面：反馈 ' + reportCount + '，练习记录 ' + practiceCount + '，收藏 ' + favoriteCount + '，错题 ' + wrongCount + '。';
          if (impactResp && Array.isArray(impactResp.missingTables) && impactResp.missingTables.length) {
            text += '\n（部分统计表缺失：' + impactResp.missingTables.join(', ') + '）';
          }
          return text;
        }

        function patchStatus(id, status, adminNote) {
          var body = { status: status };
          if (adminNote !== undefined && adminNote !== '') body.adminNote = adminNote;
          authFetch('/admin/question-reports/' + id, { method: 'PATCH', body: body })
            .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
            .then(function (x) {
              if (!x.res.ok) throw new Error(x.j.message || '更新失败');
              load();
            })
            .catch(function (e) { el('err').textContent = e.message || String(e); });
        }

        function load() {
          el('err').textContent = '';
          var st = el('statusFilter').value;
          var viewMode = el('viewMode').value || 'detail';
          var q = '?pageSize=50&view=' + encodeURIComponent(viewMode);
          if (st) q += '&status=' + encodeURIComponent(st);
          if (viewMode === 'question') {
            var sm = String(el('sortMode').value || 'latestReportedAt:desc').split(':');
            var sortBy = sm[0] || 'latestReportedAt';
            var sortOrder = sm[1] || 'desc';
            q += '&sortBy=' + encodeURIComponent(sortBy) + '&sortOrder=' + encodeURIComponent(sortOrder);
          }
          authFetch('/admin/question-reports' + q)
            .then(function (res) { return res.json(); })
            .then(function (data) {
              render(data.data || [], data.view || viewMode);
              el('summary').textContent = '共 ' + (data.total || 0) + ' 条（' + (data.view || viewMode) + '）';
            })
            .catch(function (e) { el('err').textContent = e.message || String(e); });
        }

        function refreshRoleThenLoad() {
          authFetch('/admin/auth/me')
            .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
            .then(function (x) {
              if (x.res.ok && x.j.user && x.j.user.role === 'admin') isAdmin = true;
              else isAdmin = false;
              load();
            })
            .catch(function () {
              isAdmin = false;
              load();
            });
        }

        el('loadBtn').onclick = refreshRoleThenLoad;
        el('statusFilter').onchange = refreshRoleThenLoad;
        el('viewMode').onchange = refreshRoleThenLoad;
        el('sortMode').onchange = refreshRoleThenLoad;
        refreshRoleThenLoad();
      })();
    </script>
  </body>
</html>
