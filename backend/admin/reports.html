<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>题目反馈</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 24px; color: #222; }
      h1 { margin: 0 0 16px; }
      .toolbar { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      select, button, textarea { padding: 8px; font-size: 14px; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      th, td { border: 1px solid #ddd; padding: 8px; font-size: 13px; vertical-align: top; }
      th { background: #f8f8f8; text-align: left; }
      .stem { max-width: 280px; white-space: pre-wrap; word-break: break-word; }
      .muted { color: #666; font-size: 12px; }
      .err { color: #b42318; margin-top: 8px; }
      .dash { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 12px; max-width: 960px; }
      .dash .card { border: 1px solid #eee; border-radius: 8px; padding: 10px; background: #fff; }
      .dash .k { font-size: 12px; color: #666; }
      .dash .v { font-size: 18px; font-weight: 600; color: #222; }
      .dash-line { margin: 6px 0 12px; font-size: 12px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .risk-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; }
      .risk-high { background: #fee4e2; color: #b42318; }
      .risk-medium { background: #fff7e6; color: #ad6800; }
      .risk-low { background: #eef2ff; color: #2f5a8c; }
      .sla-warn { display: inline-block; margin-left: 4px; padding: 1px 6px; border-radius: 4px; font-size: 11px; background: #fff4e6; color: #ad4e00; font-weight: 600; }
      #staleHoursInput { width: 56px; }
    </style>
  </head>
  <body>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h1 style="margin:0">学生题目反馈</h1>
      <div>
        <a href="/admin-ui/index.html">导入任务</a>
        <span style="margin:0 8px">|</span>
        <a href="/admin-ui/users.html">用户管理</a>
        <span style="margin:0 8px">|</span>
        <a href="/admin-ui/classes.html">班级学情</a>
        <button type="button" id="logoutBtn" style="margin-left:12px;padding:8px 14px">退出</button>
      </div>
    </div>
    <div class="dash">
      <div class="card"><div class="k">反馈总量</div><div class="v" id="dTotal">-</div></div>
      <div class="card"><div class="k">待处理</div><div class="v" id="dOpen">-</div></div>
      <div class="card"><div class="k">处理中</div><div class="v" id="dReviewing">-</div></div>
      <div class="card"><div class="k">已处理</div><div class="v" id="dClosed">-</div></div>
      <div class="card"><div class="k">平均处理时长(小时)</div><div class="v" id="dAvg">-</div></div>
      <div class="card"><div class="k" id="dStaleK">SLA超时工单</div><div class="v" id="dStale">-</div></div>
    </div>
    <div class="dash-line" id="dTrend"></div>
    <div class="dash-line" id="dSubject"></div>
    <div class="toolbar">
      <label>状态 <select id="statusFilter">
        <option value="">全部</option>
        <option value="open" selected>待处理</option>
        <option value="reviewing">处理中</option>
        <option value="closed">已关闭</option>
      </select></label>
      <label>视图 <select id="viewMode">
        <option value="detail">反馈明细</option>
        <option value="question">按题聚合</option>
      </select></label>
      <label>排序 <select id="sortMode">
        <option value="priorityScore:desc" selected>优先级(高到低)</option>
        <option value="priorityScore:asc">优先级(低到高)</option>
        <option value="latestReportedAt:desc">最近反馈(新到旧)</option>
        <option value="latestReportedAt:asc">最近反馈(旧到新)</option>
        <option value="reportCount:desc">反馈次数(高到低)</option>
        <option value="reportCount:asc">反馈次数(低到高)</option>
      </select></label>
      <label><input type="checkbox" id="highRiskOnly" /> 仅看高风险</label>
      <label><input type="checkbox" id="staleOnly" /> 仅看 SLA 超时</label>
      <label class="muted">阈值(小时) <input type="number" id="staleHoursInput" min="1" max="720" value="48" /></label>
      <button type="button" id="batchReviewBtn">批量设为处理中</button>
      <button type="button" id="batchCloseBtn">批量关闭</button>
      <button type="button" id="batchNoteBtn">批量备注</button>
      <button type="button" id="batchFixBtn">批量标记待修复</button>
      <button type="button" id="loadBtn">刷新</button>
    </div>
    <div id="err" class="err"></div>
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
    <p class="muted" id="summary"></p>

    <script src="/admin-ui/auth.js"></script>
    <script>
      (function () {
        if (!QuizWizAuth.requireLogin()) return;

        var REASON_LABEL = {
          answer_wrong: '答案可能有误',
          stem_error: '题干/表述有问题',
          option_error: '选项有问题',
          typo: '错别字/格式',
          other: '其他',
        };

        function el(id) { return document.getElementById(id); }

        el('logoutBtn').onclick = function () { QuizWizAuth.logout(); };

        function authFetch(url, opts) {
          opts = opts || {};
          opts.headers = Object.assign({}, opts.headers || {}, QuizWizAuth.getAuthHeaders());
          if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
            opts.headers['Content-Type'] = 'application/json';
            opts.body = JSON.stringify(opts.body);
          }
          return fetch(url, opts).then(function (res) {
            QuizWizAuth.handleResponse(res);
            return res;
          });
        }

        var isAdmin = false;
        var selectedIds = {};

        function render(rows, viewMode, meta) {
          meta = meta || {};
          var slaThreshold = meta.staleHours != null && meta.staleHours !== '' ? Number(meta.staleHours) : 48;
          var tb = el('tbody');
          var th = el('thead');
          tb.innerHTML = '';
          if (viewMode === 'question') {
            th.innerHTML = '<tr><th>题目ID</th><th>优先级</th><th>最久待处理(h)</th><th>最近7天</th><th>最近反馈时间</th><th>反馈总数</th><th>状态分布</th><th>题干摘要</th><th>操作</th></tr>';
            selectedIds = {};
          } else {
            th.innerHTML = '<tr><th><input type="checkbox" id="checkAll" /></th><th>ID</th><th>时间</th><th>学生ID</th><th>题目ID</th><th>题干摘要</th><th>类型</th><th>说明</th><th>状态</th><th>待处理(h)</th><th>操作</th></tr>';
          }
          if (!rows.length) {
            tb.innerHTML = '<tr><td colspan="' + (viewMode === 'question' ? 9 : 11) + '">暂无记录</td></tr>';
            return;
          }
          if (viewMode === 'question') {
            rows.forEach(function (r) {
              var tr = document.createElement('tr');
              var stem = (r.stem || '').slice(0, 120) + ((r.stem || '').length > 120 ? '…' : '');
              var statusDist = 'open:' + (r.openCount || 0) + ' / reviewing:' + (r.reviewingCount || 0) + ' / closed:' + (r.closedCount || 0);
              var riskClass = 'risk-' + (r.priorityLevel || 'low');
              var priorityLabel = '<span class="risk-badge ' + riskClass + '">' + (r.priorityLevel || 'low') + ' (' + (r.priorityScore || 0) + ')</span>';
              var staleH = r.stalestActiveHours;
              var staleNum = staleH == null || staleH === '' ? null : Number(staleH);
              var staleCell = staleNum == null || !Number.isFinite(staleNum) ? '-' : String(staleNum);
              if (staleNum != null && Number.isFinite(staleNum) && staleNum >= slaThreshold) {
                staleCell += '<span class="sla-warn">超时</span>';
              }
              tr.innerHTML =
                '<td>' + r.questionId + '</td>' +
                '<td>' + priorityLabel + '</td>' +
                '<td>' + staleCell + '</td>' +
                '<td>' + (r.recent7dCount || 0) + '</td>' +
                '<td>' + (r.latestReportedAt || '') + '</td>' +
                '<td>' + (r.reportCount || 0) + '</td>' +
                '<td>' + statusDist + '</td>' +
                '<td class="stem">' + stem.replace(/</g, '&lt;') + '</td>' +
                '<td></td>';
              var op = tr.querySelector('td:last-child');
              var activeReportId = Number(r.latestActiveReportId || 0);
              if (isAdmin && r.questionStatus === 'archived' && !r.questionDeleted) {
                var bRepAgg = document.createElement('button');
                bRepAgg.textContent = '修复完成并上架';
                bRepAgg.style.marginRight = '4px';
                bRepAgg.onclick = function () {
                  if (!window.confirm('将把题目重新上架为已发布，并关闭该题下所有待处理/处理中的工单。确定吗？')) return;
                  var note = window.prompt('备注（可选，留空则使用默认说明）', '');
                  if (note === null) return;
                  republishQuestion(r.questionId, note);
                };
                op.appendChild(bRepAgg);
              }
              if (isAdmin && activeReportId > 0 && !r.questionDeleted) {
                var bFixAgg = document.createElement('button');
                bFixAgg.textContent = '标记待修复';
                bFixAgg.style.marginRight = '4px';
                bFixAgg.onclick = function () {
                  var note = window.prompt('备注（可选，留空则使用默认说明）', '');
                  if (note === null) return;
                  markFixNeeded(activeReportId, note);
                };
                op.appendChild(bFixAgg);

                var bReplaceAgg = document.createElement('button');
                bReplaceAgg.textContent = '替换题目并关单';
                bReplaceAgg.style.marginRight = '4px';
                bReplaceAgg.onclick = function () {
                  var replacementId = window.prompt('请输入替换题目ID（必须为已发布且未删除）', '');
                  if (replacementId === null) return;
                  var rid = Number(String(replacementId).trim());
                  if (!rid) { el('err').textContent = '替换题目ID无效'; return; }
                  var note = window.prompt('备注（可选，留空则使用默认说明）', '');
                  if (note === null) return;
                  replaceQuestion(activeReportId, rid, note);
                };
                op.appendChild(bReplaceAgg);

                var bDelAgg = document.createElement('button');
                bDelAgg.textContent = '确认有误并删除题目';
                bDelAgg.style.color = '#b42318';
                bDelAgg.onclick = function () {
                  getQuestionImpact(r.questionId)
                    .then(function (impactResp) {
                      var msg = impactText(impactResp) + '\n将把该题从题库下架（软删除），并关闭一条活跃反馈单。此操作不可撤销，确定吗？';
                      if (!window.confirm(msg)) return;
                      var note = window.prompt('备注（可选，留空则使用系统默认说明）', '');
                      if (note === null) return;
                      confirmDeleteQuestion(activeReportId, note);
                    })
                    .catch(function (e) { el('err').textContent = e.message || String(e); });
                };
                op.appendChild(bDelAgg);
              } else {
                op.textContent = '-';
              }
              tb.appendChild(tr);
            });
            return;
          }
          rows.forEach(function (r) {
            var tr = document.createElement('tr');
            var stem = (r.stem || '').slice(0, 120) + ((r.stem || '').length > 120 ? '…' : '');
            var ageH = r.activeAgeHours;
            var ageNum = ageH == null || ageH === '' ? null : Number(ageH);
            var ageCell = ageNum == null || !Number.isFinite(ageNum) ? '-' : String(ageNum);
            if (ageNum != null && Number.isFinite(ageNum) && ageNum >= slaThreshold) {
              ageCell += '<span class="sla-warn">超时</span>';
            }
            tr.innerHTML =
              '<td><input type="checkbox" class="rowCheck" data-id="' + r.id + '" /></td>' +
              '<td>' + r.id + '</td>' +
              '<td>' + (r.createdAt || '') + '</td>' +
              '<td>' + r.studentId + '</td>' +
              '<td>' + r.questionId + '</td>' +
              '<td class="stem">' + stem.replace(/</g, '&lt;') + '</td>' +
              '<td>' + (REASON_LABEL[r.reasonType] || r.reasonType) + '</td>' +
              '<td>' + String(r.detail || '').replace(/</g, '&lt;') + '</td>' +
              '<td>' + r.status + '</td>' +
              '<td>' + ageCell + '</td>' +
              '<td data-id="' + r.id + '"></td>';
            var op = tr.querySelector('td:last-child');
            if (r.status === 'open') {
              var b1 = document.createElement('button');
              b1.textContent = '处理中';
              b1.onclick = function () { patchStatus(r.id, 'reviewing'); };
              op.appendChild(b1);
            }
            if (isAdmin && r.questionStatus === 'archived' && !r.questionDeleted) {
              var bRep = document.createElement('button');
              bRep.textContent = '修复完成并上架';
              bRep.style.marginLeft = '4px';
              bRep.onclick = function () {
                if (!window.confirm('将把题目重新上架为已发布，并关闭该题下所有待处理/处理中的工单。确定吗？')) return;
                var note = window.prompt('备注（可选，留空则使用默认说明）', '');
                if (note === null) return;
                republishQuestion(r.questionId, note);
              };
              op.appendChild(bRep);
            }
            if (isAdmin && r.status !== 'closed' && !r.questionDeleted) {
              var bFix = document.createElement('button');
              bFix.textContent = '标记待修复';
              bFix.style.marginLeft = '4px';
              bFix.onclick = function () {
                var note = window.prompt('备注（可选，留空则使用默认说明）', '');
                if (note === null) return;
                markFixNeeded(r.id, note);
              };
              op.appendChild(bFix);

              var bReplace = document.createElement('button');
              bReplace.textContent = '替换题目并关单';
              bReplace.style.marginLeft = '4px';
              bReplace.onclick = function () {
                var replacementId = window.prompt('请输入替换题目ID（必须为已发布且未删除）', '');
                if (replacementId === null) return;
                var rid = Number(String(replacementId).trim());
                if (!rid) { el('err').textContent = '替换题目ID无效'; return; }
                var note = window.prompt('备注（可选，留空则使用默认说明）', '');
                if (note === null) return;
                replaceQuestion(r.id, rid, note);
              };
              op.appendChild(bReplace);

              var bDel = document.createElement('button');
              bDel.textContent = '确认有误并删除题目';
              bDel.style.marginLeft = '4px';
              bDel.style.color = '#b42318';
              bDel.onclick = function () {
                getQuestionImpact(r.questionId)
                  .then(function (impactResp) {
                    var msg = impactText(impactResp) + '\n将把该题从题库下架（软删除），并关闭本条反馈。此操作不可撤销，确定吗？';
                    if (!window.confirm(msg)) return;
                    var note = window.prompt('备注（可选，留空则使用系统默认说明）', '');
                    if (note === null) return;
                    confirmDeleteQuestion(r.id, note);
                  })
                  .catch(function (e) { el('err').textContent = e.message || String(e); });
              };
              op.appendChild(bDel);
            }
            if (r.status !== 'closed') {
              var b2 = document.createElement('button');
              b2.textContent = '关闭';
              b2.style.marginLeft = '4px';
              b2.onclick = function () {
                var note = window.prompt('备注（可选）', '');
                if (note === null) return;
                patchStatus(r.id, 'closed', note);
              };
              op.appendChild(b2);
            }
            tb.appendChild(tr);
          });
          var checkAll = document.getElementById('checkAll');
          if (checkAll) {
            checkAll.onchange = function () {
              var checked = !!checkAll.checked;
              Array.prototype.forEach.call(document.querySelectorAll('.rowCheck'), function (cb) {
                cb.checked = checked;
                selectedIds[cb.getAttribute('data-id')] = checked;
              });
            };
          }
          Array.prototype.forEach.call(document.querySelectorAll('.rowCheck'), function (cb) {
            cb.onchange = function () {
              selectedIds[cb.getAttribute('data-id')] = !!cb.checked;
            };
          });
        }

        function confirmDeleteQuestion(id, note) {
          var body = {};
          if (note && String(note).trim()) body.adminNote = String(note).trim();
          authFetch('/admin/question-reports/' + id + '/confirm-delete-question', { method: 'POST', body: body })
            .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
            .then(function (x) {
              if (!x.res.ok) throw new Error(x.j.message || '操作失败');
              load();
            })
            .catch(function (e) { el('err').textContent = e.message || String(e); });
        }

        function getQuestionImpact(questionId) {
          return authFetch('/admin/question-reports/question-impact/' + questionId)
            .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
            .then(function (x) {
              if (!x.res.ok) throw new Error(x.j.message || '加载题目影响面失败');
              return x.j;
            });
        }

        function markFixNeeded(id, note) {
          var body = {};
          if (note && String(note).trim()) body.adminNote = String(note).trim();
          authFetch('/admin/question-reports/' + id + '/mark-fix-needed', { method: 'POST', body: body })
            .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
            .then(function (x) {
              if (!x.res.ok) throw new Error(x.j.message || '操作失败');
              load();
            })
            .catch(function (e) { el('err').textContent = e.message || String(e); });
        }

        function replaceQuestion(id, replacementQuestionId, note) {
          var body = { replacementQuestionId: replacementQuestionId };
          if (note && String(note).trim()) body.adminNote = String(note).trim();
          authFetch('/admin/question-reports/' + id + '/replace-question', { method: 'POST', body: body })
            .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
            .then(function (x) {
              if (!x.res.ok) throw new Error(x.j.message || '操作失败');
              load();
            })
            .catch(function (e) { el('err').textContent = e.message || String(e); });
        }

        function republishQuestion(questionId, note) {
          var body = { questionId: questionId };
          if (note && String(note).trim()) body.adminNote = String(note).trim();
          authFetch('/admin/question-reports/republish-question', { method: 'POST', body: body })
            .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
            .then(function (x) {
              if (!x.res.ok) throw new Error(x.j.message || '操作失败');
              load();
            })
            .catch(function (e) { el('err').textContent = e.message || String(e); });
        }

        function getSelectedIds() {
          return Object.keys(selectedIds).filter(function (k) { return selectedIds[k]; }).map(function (k) { return Number(k); }).filter(Boolean);
        }

        function batchAction(action, extra) {
          var ids = getSelectedIds();
          if (!ids.length) { el('err').textContent = '请先勾选至少一条工单'; return; }
          var body = Object.assign({ action: action, ids: ids }, extra || {});
          authFetch('/admin/question-reports/batch', { method: 'POST', body: body })
            .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
            .then(function (x) {
              if (!x.res.ok) throw new Error(x.j.message || '批量处理失败');
              selectedIds = {};
              load();
            })
            .catch(function (e) { el('err').textContent = e.message || String(e); });
        }

        function impactText(impactResp) {
          var impact = impactResp && impactResp.impact ? impactResp.impact : {};
          var reportCount = impact.reportCount == null ? 'N/A' : String(impact.reportCount);
          var practiceCount = impact.practiceAnswerCount == null ? 'N/A' : String(impact.practiceAnswerCount);
          var favoriteCount = impact.favoriteCount == null ? 'N/A' : String(impact.favoriteCount);
          var wrongCount = impact.wrongQuestionCount == null ? 'N/A' : String(impact.wrongQuestionCount);
          var text = '影响面：反馈 ' + reportCount + '，练习记录 ' + practiceCount + '，收藏 ' + favoriteCount + '，错题 ' + wrongCount + '。';
          if (impactResp && Array.isArray(impactResp.missingTables) && impactResp.missingTables.length) {
            text += '\n（部分统计表缺失：' + impactResp.missingTables.join(', ') + '）';
          }
          return text;
        }

        function patchStatus(id, status, adminNote) {
          var body = { status: status };
          if (adminNote !== undefined && adminNote !== '') body.adminNote = adminNote;
          authFetch('/admin/question-reports/' + id, { method: 'PATCH', body: body })
            .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
            .then(function (x) {
              if (!x.res.ok) throw new Error(x.j.message || '更新失败');
              load();
            })
            .catch(function (e) { el('err').textContent = e.message || String(e); });
        }

        function loadDashboard() {
          authFetch('/admin/question-reports/dashboard')
            .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
            .then(function (x) {
              if (!x.res.ok) throw new Error(x.j.message || '加载看板失败');
              var ov = (x.j && x.j.overview) || {};
              el('dTotal').textContent = String(ov.total || 0);
              el('dOpen').textContent = String(ov.openCount || 0);
              el('dReviewing').textContent = String(ov.reviewingCount || 0);
              el('dClosed').textContent = String(ov.closedCount || 0);
              el('dAvg').textContent = ov.avgCloseHours == null ? '-' : String(Number(ov.avgCloseHours).toFixed(1));
              var trend = Array.isArray(x.j.trend7d) ? x.j.trend7d : [];
              el('dTrend').textContent = trend.length
                ? '近7日新增：' + trend.map(function (r) { return String(r.date).slice(5) + '=' + r.count; }).join(' | ')
                : '近7日新增：-';
              var bySubject = Array.isArray(x.j.bySubject) ? x.j.bySubject : [];
              if (x.j.subjectMissing) el('dSubject').textContent = '学科分布：相关表缺失';
              else el('dSubject').textContent = bySubject.length
                ? '学科分布：' + bySubject.map(function (r) { return r.subjectName + '=' + r.count; }).join(' | ')
                : '学科分布：暂无数据';
            })
            .catch(function () {
              el('dTotal').textContent = '-';
              el('dOpen').textContent = '-';
              el('dReviewing').textContent = '-';
              el('dClosed').textContent = '-';
              el('dAvg').textContent = '-';
              el('dStaleK').textContent = 'SLA超时工单';
              el('dStale').textContent = '-';
              el('dTrend').textContent = '近7日新增：-';
              el('dSubject').textContent = '学科分布：-';
            });
        }

        function load() {
          el('err').textContent = '';
          var st = el('statusFilter').value;
          var viewMode = el('viewMode').value || 'detail';
          var q = '?pageSize=50&view=' + encodeURIComponent(viewMode);
          if (st) q += '&status=' + encodeURIComponent(st);
          if (viewMode === 'question') {
            var sm = String(el('sortMode').value || 'priorityScore:desc').split(':');
            var sortBy = sm[0] || 'latestReportedAt';
            var sortOrder = sm[1] || 'desc';
            q += '&sortBy=' + encodeURIComponent(sortBy) + '&sortOrder=' + encodeURIComponent(sortOrder);
            if (el('highRiskOnly').checked) q += '&highRiskOnly=true';
          }
          if (el('staleOnly').checked) {
            q += '&staleOnly=true';
            q += '&staleHours=' + encodeURIComponent(String(currentStaleHoursForApi()));
          }
          authFetch('/admin/question-reports' + q)
            .then(function (res) { return res.json(); })
            .then(function (data) {
              var meta = { staleHours: data.staleHours != null ? Number(data.staleHours) : 48 };
              render(data.data || [], data.view || viewMode, meta);
              var sum = '共 ' + (data.total || 0) + ' 条（' + (data.view || viewMode) + '）';
              if (data.staleOnly) sum += ' · SLA≥' + (data.staleHours != null ? data.staleHours : '') + 'h';
              el('summary').textContent = sum;
            })
            .catch(function (e) { el('err').textContent = e.message || String(e); });
        }

        function refreshRoleThenLoad() {
          authFetch('/admin/auth/me')
            .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
            .then(function (x) {
              if (x.res.ok && x.j.user && x.j.user.role === 'admin') isAdmin = true;
              else isAdmin = false;
              loadDashboard();
              load();
            })
            .catch(function () {
              isAdmin = false;
              loadDashboard();
              load();
            });
        }

        el('loadBtn').onclick = refreshRoleThenLoad;
        el('batchReviewBtn').onclick = function () { batchAction('setStatus', { status: 'reviewing' }); };
        el('batchCloseBtn').onclick = function () { batchAction('setStatus', { status: 'closed' }); };
        el('batchNoteBtn').onclick = function () {
          var note = window.prompt('批量备注内容', '');
          if (note === null) return;
          batchAction('setNote', { adminNote: note });
        };
        el('batchFixBtn').onclick = function () {
          if (!isAdmin) { el('err').textContent = '仅管理员可批量标记待修复'; return; }
          var note = window.prompt('批量标记待修复备注（可选）', '');
          if (note === null) return;
          batchAction('markFixNeeded', { adminNote: note });
        };
        el('statusFilter').onchange = refreshRoleThenLoad;
        el('viewMode').onchange = refreshRoleThenLoad;
        el('sortMode').onchange = refreshRoleThenLoad;
        el('highRiskOnly').onchange = refreshRoleThenLoad;
        el('staleOnly').onchange = refreshRoleThenLoad;
        el('staleHoursInput').onchange = refreshRoleThenLoad;
        refreshRoleThenLoad();
      })();
    </script>
  </body>
</html>
