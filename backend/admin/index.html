<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizWiz 导入任务列表</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 24px; color: #222; }
      h1 { margin: 0 0 16px; }
      .toolbar { margin-bottom: 16px; display: flex; gap: 8px; }
      .panel { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 16px; background: #fafafa; }
      .panel h3 { margin: 0 0 10px; }
      input, select, button { padding: 8px; }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border: 1px solid #ddd; padding: 8px; font-size: 14px; }
      th { background: #f8f8f8; text-align: left; }
      .muted { color: #666; margin-top: 8px; }
      .result { margin-top: 8px; font-size: 14px; color: #333; }
    </style>
  </head>
  <body>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h1 style="margin:0">导入任务列表</h1>
      <div>
        <a href="/admin-ui/users.html" style="margin-right:12px">用户管理</a>
        <a href="/admin-ui/reports.html" style="margin-right:12px">题目反馈</a>
        <a href="/admin-ui/classes.html" style="margin-right:12px">班级学情</a>
        <button type="button" id="logoutBtn" style="padding:8px 14px">退出登录</button>
      </div>
    </div>
    <div class="panel">
      <h3>上传 Excel</h3>
      <div class="row">
        <input id="fileInput" type="file" accept=".xlsx,.xls" />
        <button id="previewBtn">预检</button>
        <button id="importBtn">正式导入</button>
        <button type="button" id="downloadTplBtn">下载模板</button>
      </div>
      <div class="result" id="uploadResult">请选择一个 Excel 文件后操作。</div>
    </div>

    <div class="toolbar">
      <select id="mode">
        <option value="">全部模式</option>
        <option value="preview">preview</option>
        <option value="import">import</option>
      </select>
      <select id="status">
        <option value="">全部状态</option>
        <option value="running">running</option>
        <option value="done">done</option>
        <option value="failed">failed</option>
      </select>
      <label>开始日期 <input id="startDate" type="date" /></label>
      <label>结束日期 <input id="endDate" type="date" /></label>
      <button id="searchBtn">查询</button>
      <button id="resetBtn" type="button">重置筛选</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>模式</th>
          <th>文件名</th>
          <th>总行数</th>
          <th>成功</th>
          <th>失败</th>
          <th>状态</th>
          <th>更新时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <p class="muted" id="pagination"></p>

    <script src="auth.js"></script>
    <script>
      (function () {
        if (!QuizWizAuth.getToken()) {
          location.href = '/admin-ui/login.html';
          return;
        }
        document.getElementById('logoutBtn').addEventListener('click', function () {
          QuizWizAuth.logout();
        });
      const tbody = document.getElementById('tbody');
      const pagination = document.getElementById('pagination');
      const modeEl = document.getElementById('mode');
      const statusEl = document.getElementById('status');
      const startDateEl = document.getElementById('startDate');
      const endDateEl = document.getElementById('endDate');
      const searchBtn = document.getElementById('searchBtn');
      const resetBtn = document.getElementById('resetBtn');
      const fileInput = document.getElementById('fileInput');
      const previewBtn = document.getElementById('previewBtn');
      const importBtn = document.getElementById('importBtn');
      const downloadTplBtn = document.getElementById('downloadTplBtn');
      const uploadResult = document.getElementById('uploadResult');

      function syncDateBounds() {
        if (startDateEl.value) {
          endDateEl.min = startDateEl.value;
        } else {
          endDateEl.removeAttribute('min');
        }
        if (endDateEl.value) {
          startDateEl.max = endDateEl.value;
        } else {
          startDateEl.removeAttribute('max');
        }
      }

      async function loadJobs(page = 1) {
        if (startDateEl.value && endDateEl.value && startDateEl.value > endDateEl.value) {
          uploadResult.textContent = '开始日期不能晚于结束日期';
          return;
        }
        const params = new URLSearchParams({ page: String(page), pageSize: '20' });
        if (modeEl.value) params.set('mode', modeEl.value);
        if (statusEl.value) params.set('status', statusEl.value);
        if (startDateEl.value) params.set('startDate', startDateEl.value);
        if (endDateEl.value) params.set('endDate', endDateEl.value);
        const res = await fetch(`/admin/questions/import/jobs?${params.toString()}`, {
          headers: QuizWizAuth.getAuthHeaders(),
        });
        const okRes = QuizWizAuth.handleResponse(res);
        if (!okRes) return;
        const json = await okRes.json();
        tbody.innerHTML = '';
        (json.data || []).forEach((row) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.id}</td>
            <td>${row.mode}</td>
            <td>${row.fileName}</td>
            <td>${row.totalRows}</td>
            <td>${row.successCount}</td>
            <td>${row.failedRowCount}</td>
            <td>${row.status}</td>
            <td>${row.updatedAt || ''}</td>
            <td><a href="/admin-ui/detail.html?id=${row.id}">查看详情</a></td>
          `;
          tbody.appendChild(tr);
        });
        pagination.textContent = `共 ${json.total || 0} 条，当前第 ${json.page || 1} 页`;
      }

      async function uploadExcel(endpoint) {
        const file = fileInput.files && fileInput.files[0];
        if (!file) {
          uploadResult.textContent = '请先选择 Excel 文件。';
          return;
        }
        previewBtn.disabled = true;
        importBtn.disabled = true;
        uploadResult.textContent = '处理中，请稍候...';
        try {
          const formData = new FormData();
          formData.append('file', file);
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: QuizWizAuth.getAuthHeaders(),
            body: formData,
          });
          const okRes = QuizWizAuth.handleResponse(res);
          if (!okRes) return;
          const json = await okRes.json();
          if (!okRes.ok) {
            uploadResult.textContent = `失败：${json.message || '请求失败'}`;
            return;
          }
          uploadResult.innerHTML = `任务 #${json.jobId} 完成：成功 ${json.successCount}，失败 ${json.failCount}。<a href="/admin-ui/detail.html?id=${json.jobId}">查看详情</a>`;
          await loadJobs(1);
        } catch (error) {
          uploadResult.textContent = `失败：${error.message}`;
        } finally {
          previewBtn.disabled = false;
          importBtn.disabled = false;
        }
      }

      searchBtn.addEventListener('click', () => loadJobs(1));
      startDateEl.addEventListener('change', () => {
        syncDateBounds();
        if (endDateEl.value && endDateEl.value < startDateEl.value) {
          endDateEl.value = startDateEl.value;
        }
      });
      endDateEl.addEventListener('change', () => {
        syncDateBounds();
        if (startDateEl.value && startDateEl.value > endDateEl.value) {
          startDateEl.value = endDateEl.value;
        }
      });
      resetBtn.addEventListener('click', () => {
        modeEl.value = '';
        statusEl.value = '';
        startDateEl.value = '';
        endDateEl.value = '';
        syncDateBounds();
        loadJobs(1);
      });
      previewBtn.addEventListener('click', () => uploadExcel('/admin/questions/import/preview'));
      importBtn.addEventListener('click', () => uploadExcel('/admin/questions/import'));
      downloadTplBtn.addEventListener('click', function () {
        // 避免某些浏览器/下载插件对 blob URL 的兼容问题，直接下载静态模板兜底链接
        const a = document.createElement('a');
        a.href = `/templates/question_import_template.xlsx?t=${Date.now()}`;
        a.download = 'question_import_template.xlsx';
        document.body.appendChild(a);
        a.click();
        a.remove();
        uploadResult.textContent = '已触发模板下载。';
      });
      syncDateBounds();
      loadJobs(1);
      })();
    </script>
  </body>
</html>
