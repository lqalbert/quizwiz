<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizWiz 管理后台登录</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f0f2f5;
        color: #222;
      }
      .box {
        width: 100%;
        max-width: 360px;
        padding: 28px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }
      h1 { margin: 0 0 20px; font-size: 20px; }
      label { display: block; margin-bottom: 6px; font-size: 14px; color: #444; }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        margin-bottom: 16px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
      }
      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #1677ff;
        color: #fff;
        font-size: 15px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .err { color: #cf1322; font-size: 14px; margin-top: 12px; }
      .hint { font-size: 12px; color: #888; margin-top: 16px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>管理后台登录</h1>
      <form id="form">
        <label for="username">用户名</label>
        <input id="username" type="text" name="username" autocomplete="username" required />
        <label for="password">密码</label>
        <input id="password" type="password" name="password" autocomplete="current-password" required />
        <button type="submit" id="submitBtn">登录</button>
      </form>
      <div class="err" id="err"></div>
      <p class="hint">
        首次部署请在 <code>.env</code> 配置 <code>BOOTSTRAP_ADMIN_EMAIL</code>（用户名）与
        <code>BOOTSTRAP_ADMIN_PASSWORD</code>，启动服务后会自动创建管理员账号。
      </p>
    </div>
    <script src="auth.js"></script>
    <script>
      if (QuizWizAuth.getToken()) {
        location.href = '/admin-ui/index.html';
      }
      const form = document.getElementById('form');
      const errEl = document.getElementById('err');
      const submitBtn = document.getElementById('submitBtn');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errEl.textContent = '';
        submitBtn.disabled = true;
        try {
          const username = document.getElementById('username').value.trim();
          const usernameRegex = /^[A-Za-z0-9\u4e00-\u9fff]+$/;
          if (username.length < 2 || username.length > 20) {
            errEl.textContent = '用户名长度需为 2-20 位';
            return;
          }
          if (!usernameRegex.test(username)) {
            errEl.textContent = '用户名仅支持汉字、字母、数字';
            return;
          }
          const res = await fetch('/admin/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username,
              password: document.getElementById('password').value,
            }),
          });
          const json = await res.json();
          if (!res.ok) {
            errEl.textContent = json.message || '登录失败';
            return;
          }
          QuizWizAuth.setToken(json.token);
          location.href = '/admin-ui/index.html';
        } catch (x) {
          errEl.textContent = x.message || '网络错误';
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
