# QuizWiz 生产站点
# 域名：DNS A 记录 www.quizwiz.cn、quizwiz.cn → 服务器公网 IP（如 118.24.107.252）
# 小程序 request 合法域名填：www.quizwiz.cn（与下方 server_name 一致）
#
# 申请证书（在 80 可访问本机且域名已解析后执行）：
#   sudo certbot --nginx -d www.quizwiz.cn -d quizwiz.cn
# 证书路径以 certbot 输出为准，常见为：
#   /etc/letsencrypt/live/www.quizwiz.cn/fullchain.pem
#   或 /etc/letsencrypt/live/quizwiz.cn/fullchain.pem
# 若路径不同，请改下面 ssl_certificate 两行。
#
# 若尚未有 HTTPS：可暂时只保留「HTTP 反代」段（见文件末尾注释块），申请证书后再启用本文件完整配置。

# ---- HTTP：跳转到 https://www.quizwiz.cn ----
server {
    listen 80;
    listen [::]:80;
    server_name www.quizwiz.cn quizwiz.cn;
    return 301 https://www.quizwiz.cn$request_uri;
}

# ---- HTTPS：根域名跳转到 www ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name quizwiz.cn;

    ssl_certificate     /etc/letsencrypt/live/www.quizwiz.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.quizwiz.cn/privkey.pem;

    return 301 https://www.quizwiz.cn$request_uri;
}

# ---- HTTPS：主站（API /wx、/admin、/admin-ui、/health 等）----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.quizwiz.cn;

    ssl_certificate     /etc/letsencrypt/live/www.quizwiz.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.quizwiz.cn/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

